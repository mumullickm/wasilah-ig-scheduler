name: Wasilah Statics publish

# 2/day to Instagram + Facebook at 01:40 + 16:10 UTC (07:40 AM & 10:10 PM
# Dhaka), a few minutes after the scheduled 07:30/22:00 BD slots. Self-heals:
# any due-but-unposted static goes out on the next tick.
on:
  schedule:
    - cron: '40 1 * * *'
    - cron: '10 16 * * *'   # batch-1 PM 22:00 BD (ends 4 Aug)
    - cron: '5 7 * * *'     # batch-2 midday 13:00 BD (from 5 Aug)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wasilah-publisher
  cancel-in-progress: false

jobs:
  publish-statics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish due statics (IG + FB)
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: python3 run_statics.py
      - name: Commit updated state
        run: |
          git config user.name "wasilah-bot"
          git config user.email "wasilah-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add posted_statics.json
          git diff --staged --quiet || git commit -m "state: update posted statics [skip ci]"
          git push
